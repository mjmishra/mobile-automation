name: Mobile E2E Tests

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - both

# ── Global env ─────────────────────────────────────────────────────────────────
env:
  APPIUM_PORT: 4723
  EXPLICIT_TIMEOUT: 20
  COMMAND_TIMEOUT: 300

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # ANDROID JOB
  # ════════════════════════════════════════════════════════════════════════════
  android:
    name: Android Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'))

    strategy:
      fail-fast: false
      matrix:
        api-level: [ 29, 33 ]

    steps:

      # ── Step 1: Enable KVM hardware acceleration ──────────────────────────
      # Critical fix: without KVM emulator crashes with exit code 224
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          echo "KVM enabled:"
          ls -la /dev/kvm

      # ── Step 2: Checkout code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 3: Java setup ────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Step 4: Node setup ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 5: Install Appium ────────────────────────────────────────────
      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          echo "Installed drivers:"
          appium driver list

      # ── Step 6: Start Appium server ───────────────────────────────────────
      - name: Start Appium server
        run: |
          appium server --port ${{ env.APPIUM_PORT }} --log-level info > appium-android.log 2>&1 &
          echo "Waiting for Appium to start..."
          sleep 8
          curl -f http://localhost:${{ env.APPIUM_PORT }}/status && echo "Appium is UP"

      # ── Step 7: Download APK ──────────────────────────────────────────────
      - name: Download Android APK
        run: |
          mkdir -p apps
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            APK_URL="${{ github.event.client_payload.apk_url }}"
            echo "Using APK from dispatch payload: $APK_URL"
          else
            echo "Fetching latest APK from GitHub releases..."
            APK_URL=$(curl -s https://api.github.com/repos/saucelabs/my-demo-app-android/releases/latest | grep "browser_download_url.*\.apk" | grep -v "androidTest" | head -1 | cut -d '"' -f 4)
            echo "Latest APK URL: $APK_URL"
          fi
          curl -L "$APK_URL" -o apps/MyDemoApp.apk
          echo "Downloaded APK:"
          ls -lh apps/MyDemoApp.apk

      # ── Step 8: Boot emulator and run tests ───────────────────────────────
      - name: Run Android tests on API ${{ matrix.api-level }} emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd_${{ matrix.api-level }}
          force-avd-creation: true
          emulator-options: -no-snapshot -no-window -no-audio -no-boot-anim -gpu off -memory 2048 -cores 2
          disable-animations: true
          script: |
            echo "=== Step 1: Wait for ADB connection ==="
            adb wait-for-device
            echo "ADB connected"

            echo "=== Step 2: Poll sys.boot_completed on HOST shell ==="
            boot_completed=""
            attempts=0
            until [[ "$boot_completed" == "1" ]] || [[ $attempts -ge 60 ]]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
              echo "Boot status: '$boot_completed' (attempt $((attempts+1))/60)"
              sleep 5
              attempts=$((attempts+1))
            done

            if [[ "$boot_completed" != "1" ]]; then
              echo "ERROR: Emulator failed to boot after 5 minutes"
              adb devices
              exit 1
            fi

            echo "=== Step 3: Emulator booted. Preparing device ==="
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            adb shell input keyevent 82
            adb shell input keyevent 4

            echo "=== Step 4: Device status ==="
            adb devices

            echo "=== Step 5: Running tests ==="
            mvn test -Dplatform=android -DANDROID_DEVICE=emulator-5554 -DANDROID_VERSION=${{ matrix.api-level }}.0 -DEXPLICIT_TIMEOUT=${{ env.EXPLICIT_TIMEOUT }} -DCOMMAND_TIMEOUT=${{ env.COMMAND_TIMEOUT }} -DAPPIUM_PORT=${{ env.APPIUM_PORT }}

      # ── Step 9: Upload Appium log on failure ──────────────────────────────
      - name: Upload Appium server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-android-api${{ matrix.api-level }}
          path: appium-android.log

      # ── Step 10: Upload test report ───────────────────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-report-api${{ matrix.api-level }}
          path: reports/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # iOS JOB
  # ════════════════════════════════════════════════════════════════════════════
  ios:
    name: iOS Tests (${{ matrix.device }})
    runs-on: macos-14

    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'))

    strategy:
      fail-fast: false
      matrix:
        include:
          - device: "iPhone 15"
            ios-version: "17.2"
          - device: "iPhone 14"
            ios-version: "16.4"

    steps:

      # ── Step 1: Checkout code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Java setup ────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Step 3: Node setup ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 4: Install Appium ────────────────────────────────────────────
      - name: Install Appium and XCUITest driver
        run: |
          npm install -g appium@latest
          appium driver install xcuitest
          echo "Installed drivers:"
          appium driver list

      # ── Step 5: Start Appium server ───────────────────────────────────────
      - name: Start Appium server
        run: |
          appium server --port ${{ env.APPIUM_PORT }} --log-level info --log appium-ios.log &
          echo "Waiting for Appium to start..."
          sleep 8
          curl -f http://localhost:${{ env.APPIUM_PORT }}/status && echo "Appium is UP"

      # ── Step 6: Download iOS app ──────────────────────────────────────────
      - name: Download iOS Simulator app
        run: |
          mkdir -p apps
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            APP_URL="${{ github.event.client_payload.app_url }}"
            echo "Using app from dispatch payload: $APP_URL"
          else
            echo "Fetching latest iOS build from GitHub releases..."
            APP_URL=$(curl -s https://api.github.com/repos/saucelabs/my-demo-app-ios/releases/latest | grep "browser_download_url.*\.zip" | grep -v "XCUITest" | grep -v "Runner" | head -1 | cut -d '"' -f 4)
            echo "Latest app URL: $APP_URL"
          fi
          curl -L "$APP_URL" -o apps/MyDemoApp.app.zip
          echo "Downloaded app:"
          ls -lh apps/MyDemoApp.app.zip

      # ── Step 7: Check available simulators ───────────────────────────────
      - name: List available simulators
        run: |
          echo "Available iPhone simulators:"
          xcrun simctl list devices available | grep iPhone

      # ── Step 8: Boot iOS Simulator ────────────────────────────────────────
      - name: Boot iOS Simulator
        run: |
          echo "Booting ${{ matrix.device }}..."
          xcrun simctl boot "${{ matrix.device }}" || true
          echo "Waiting for boot to complete..."
          xcrun simctl bootstatus "${{ matrix.device }}" -b
          echo "Waiting extra 30s for all simulator services to settle..."
          sleep 30
          open -a Simulator || true
          sleep 10
          echo "Simulator status:"
          xcrun simctl list devices | grep "${{ matrix.device }}"

      # ── Step 9: Pre-build WebDriverAgent ─────────────────────────────────
      - name: Pre-build WebDriverAgent
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" 2>/dev/null | head -1)
          if [ -n "$WDA_PATH" ]; then
            echo "Pre-building WDA at: $WDA_PATH"
            xcodebuild build-for-testing \
              -project "$WDA_PATH" \
              -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
              CODE_SIGNING_ALLOWED=NO 2>&1 | tail -20 || echo "WDA pre-build skipped"
          else
            echo "WDA not found — will build on first test run"
          fi

      # ── Step 10: Run iOS tests ────────────────────────────────────────────
      - name: Run iOS tests on ${{ matrix.device }}
        run: mvn test -Dplatform=ios -DIOS_DEVICE="${{ matrix.device }}" -DIOS_VERSION="${{ matrix.ios-version }}" -DCOMMAND_TIMEOUT=${{ env.COMMAND_TIMEOUT }} -DEXPLICIT_TIMEOUT=${{ env.EXPLICIT_TIMEOUT }} -DAPPIUM_PORT=${{ env.APPIUM_PORT }}

      # ── Step 11: Shutdown simulator ───────────────────────────────────────
      - name: Shutdown iOS Simulator
        if: always()
        run: xcrun simctl shutdown "${{ matrix.device }}" || true

      # ── Step 12: Upload Appium log on failure ─────────────────────────────
      - name: Upload Appium server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-ios-${{ matrix.device }}
          path: appium-ios.log

      # ── Step 13: Upload test report ───────────────────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-report-${{ matrix.device }}
          path: reports/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFY JOB
  # ════════════════════════════════════════════════════════════════════════════
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [ android, ios ]
    if: always()

    steps:

      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo, message, commit, author, eventName, ref, workflow
          text: |
            Mobile E2E Tests completed.
            Triggered by: ${{ github.event_name }}
            Android: ${{ needs.android.result }}
            iOS:     ${{ needs.ios.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
